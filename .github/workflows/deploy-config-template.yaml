name: ${{{ inputs.environment }}} - Upload Config Template to S3

on:
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        description: 'Environment name.'
        required: true
        options:
          - 'prod'
          - 'prod-eu'
        default: 'prod'
    branches:
      - main
    paths:
      - 'aws/cloudformation/config_template.yml'

permissions:
  contents: read
  id-token: write

jobs:
  upload-to-s3:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare config template with organization ID
        run: |
          sed -i 's/organizationID: placeholder/organizationID: "${{ secrets.CI_ACCOUNT_ID }}"/' aws/cloudformation/config_template.yml
          sed -i 's/us-east-1/${{ secrets.CI_REGION }}/' aws/cloudformation/config_template.yml
          echo "Updated organizationID to ${{ secrets.CI_ACCOUNT_ID }} for environment ${{ inputs.environment }}"
          grep organizationID aws/cloudformation/config_template.yml
          grep region aws/cloudformation/config_template.yml

      - name: Backup existing config_template.yml
        id: backup
        run: |
          set -e
          BUCKET_NAME=${{ secrets.CI_BUCKET_NAME }}
          FILE_NAME="config_template.yml"
          TIMESTAMP=$(date +"%Y%m%d%H%M%S")
          BACKUP_FILE="config_template.yml.backup_${TIMESTAMP}"

          if aws s3 ls "s3://$BUCKET_NAME/$FILE_NAME" > /dev/null 2>&1; then
            echo "Backing up existing file to $BACKUP_FILE"
            aws s3 mv "s3://$BUCKET_NAME/$FILE_NAME" "s3://$BUCKET_NAME/$BACKUP_FILE"
          else
            echo "No existing file found, skipping backup."
            BACKUP_FILE="None"
          fi

          # Export as environment variable and step output
          echo "BACKUP_FILE=$BACKUP_FILE" >> $GITHUB_ENV
          echo "backup_file=$BACKUP_FILE" >> $GITHUB_OUTPUT

      - name: Upload new config_template.yml to S3
        id: upload
        run: |
          set -e
          BUCKET_NAME=${{ secrets.CI_BUCKET_NAME }}
          FILE_NAME="config_template.yml"

          aws s3 cp aws/cloudformation/config_template.yml "s3://$BUCKET_NAME/$FILE_NAME" --acl public-read

          echo "S3_FILE=https://$BUCKET_NAME.s3.amazonaws.com/$FILE_NAME"  >> $GITHUB_ENV
          echo "s3_file=https://$BUCKET_NAME.s3.amazonaws.com/$FILE_NAME" >> $GITHUB_OUTPUT

      - name: Post a message in Slack
        if: success()
        uses: slackapi/slack-github-action@v2.1.1
        with:
          webhook: ${{ secrets.CI_TEST_SLACK_WEBHOOK }}
          webhook-type: incoming-webhook
          payload: |
            text: "*AWS Account Integration Template Update (${{ inputs.environment }})*: ${{ job.status }}"
            blocks:
              - type: "header"
                text:
                  type: "plain_text"
                  text: "📦 AWS Account Integration Template Update (${{ inputs.environment }})"
                  emoji: true
              - type: "section"
                fields:
                  - type: "mrkdwn"
                    text: "*Status:*\n✅ Success"
                  - type: "mrkdwn"
                    text: "*Environment:*\n`${{ inputs.environment }}`"
              - type: "section"
                fields:
                  - type: "mrkdwn"
                    text: "*Organization ID:*\n`${{ secrets.CI_ACCOUNT_ID }}`"
                  - type: "mrkdwn"
                    text: "*S3 File:*\n${{ steps.upload.outputs.s3_file }}"
              - type: "section"
                fields:
                  - type: "mrkdwn"
                    text: "*File:*\n`config_template.yml`"
                  - type: "mrkdwn"
                    text: "*Backup:*\n`${{ steps.backup.outputs.backup_file }}`"
              - type: "section"
                text:
                  type: "mrkdwn"
                  text: "*Commit:*\n<${{ github.event.head_commit.url }}|View Commit>"
              - type: "context"
                elements:
                  - type: "mrkdwn"
                    text: "Triggered by GitHub Actions"
